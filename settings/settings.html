<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Settings</title>

        <link rel="stylesheet" href="style2.css">
        <script src="settings.js" defer></script>
    </head>

    <body>
        <h1>Settings</h1>
        <div class="settings-row">
            <label>Notes or letters:</label>
            <input type="checkbox" id="notes-number" class="toggle">
            <label for="notes-number"></label>
        </div>

        <div class="settings-row">
            <label>Numbers or letters:</label>
            <input type="checkbox" id="ten-eleven" class="toggle">
            <label for="ten-eleven"></label>
        </div>

        <div class="settings-row">
            <label>Type of prime form:</label>
            <input type="checkbox" id="forte-rahn" class="toggle">
            <label for="forte-rahn"></label>
<!--            <pre>Rahn is packed from the right, Forte is packed to the left</pre>-->
        </div>

        <div class="settings-row">
            <label>For Tₙ and TₙI, one or all:</label>
            <input type="checkbox" id="one-or-all" class="toggle">
            <label for="one-or-all"></label>
        </div>

        <div class="settings-row">
            <label>Show Unique Inversions?</label>
            <input type="checkbox" id="show-unique" class="toggle">
            <label for="show-unique"></label>
        </div>

        <div class="settings-row">
            <label>Manual input on?</label>
            <input type="checkbox" id="manual-input" class="toggle">
            <label for="manual-input"></label>
        </div>

        <button id="back" onclick="location.href='../index.html'">Back</button>
    </body>
</html>
