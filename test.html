<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pitch Class Set Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Fira+Code:wght@300;400;500&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="test.css">
  <script type="module" src="./modules/onStart.js" defer></script>
  <script type="module" src="./modules/keyboard.js" defer></script>
  <script type="module" src="./modules/index.js" defer></script>
</head>
<body>
<div class="container">

  <header>
    <h1>Pitch Class <em>Set</em> Calculator</h1>
    <p class="subtitle">Set Theory &amp; Transformations · Twelve-Tone Analysis</p>
  </header>

  <!-- OUTPUTS -->
  <div class="card">
    <h2>Analysis Results</h2>
    <div class="outputs">
      <div class="output-item">
        <label for="normal-order">Normal Order</label>
        <input type="text" id="normal-order" readonly>
      </div>
      <div class="output-item">
        <label for="prime-form">Prime Form</label>
        <input type="text" id="prime-form" readonly>
      </div>
      <div class="output-item">
        <label for="ic-vector">IC Vector</label>
        <input type="text" id="ic-vector" readonly>
      </div>
      <div class="output-item">
        <label for="forte-number">Forte Number</label>
        <input type="text" id="forte-number" readonly>
      </div>
      <div class="output-item">
        <label for="z-mate">Z Mate</label>
        <input type="text" id="z-mate" readonly>
      </div>
      <div class="output-item">
        <label for="known">Recognized Set</label>
        <input type="text" id="known" readonly>
      </div>
      <div class="output-item full-width">
        <label for="complement">Complement (Unordered)</label>
        <input type="text" id="complement" readonly>
      </div>
    </div>
  </div>

  <!-- KEYBOARD -->
  <div class="card keyboard-section">
    <h2>Pitch Class Keyboard</h2>

    <div class="pc-inputs">
      <!-- Black keys -->
      <div class="pc-inputs-row black-keys">
        <input type="checkbox" id="1"  class="pc">
        <label for="1"  class="pc-btn black-key"><span class="note-name">C♯/D♭</span><span class="pc-number">1</span></label>

        <input type="checkbox" id="3"  class="pc">
        <label for="3"  class="pc-btn black-key"><span class="note-name">D♯/E♭</span><span class="pc-number">3</span></label>

        <div class="spacer"></div>

        <input type="checkbox" id="6"  class="pc">
        <label for="6"  class="pc-btn black-key"><span class="note-name">F♯/G♭</span><span class="pc-number">6</span></label>

        <input type="checkbox" id="8"  class="pc">
        <label for="8"  class="pc-btn black-key"><span class="note-name">G♯/A♭</span><span class="pc-number">8</span></label>

        <input type="checkbox" id="10" class="pc">
        <label for="10" class="pc-btn black-key"><span class="note-name">A♯/B♭</span><span class="pc-number">10</span></label>
      </div>

      <!-- White keys -->
      <div class="pc-inputs-row white-keys">
        <input type="checkbox" id="0"  class="pc">
        <label for="0"  class="pc-btn white-key"><span class="note-name">C</span><span class="pc-number">0</span></label>

        <input type="checkbox" id="2"  class="pc">
        <label for="2"  class="pc-btn white-key"><span class="note-name">D</span><span class="pc-number">2</span></label>

        <input type="checkbox" id="4"  class="pc">
        <label for="4"  class="pc-btn white-key"><span class="note-name">E</span><span class="pc-number">4</span></label>

        <input type="checkbox" id="5"  class="pc">
        <label for="5"  class="pc-btn white-key"><span class="note-name">F</span><span class="pc-number">5</span></label>

        <input type="checkbox" id="7"  class="pc">
        <label for="7"  class="pc-btn white-key"><span class="note-name">G</span><span class="pc-number">7</span></label>

        <input type="checkbox" id="9"  class="pc">
        <label for="9"  class="pc-btn white-key"><span class="note-name">A</span><span class="pc-number">9</span></label>

        <input type="checkbox" id="11" class="pc">
        <label for="11" class="pc-btn white-key"><span class="note-name">B</span><span class="pc-number">11</span></label>
      </div>
    </div>

    <!-- Inputs -->
    <div class="input-section">
      <div class="input-group">
        <label for="input">Input a Set</label>
        <input type="text" id="input" placeholder="e.g. 0 1 4 6">
      </div>
      <div class="input-group">
        <label for="output">Unordered Set</label>
        <input type="text" id="output" readonly>
      </div>
    </div>

    <!-- Buttons -->
    <div class="button-grid">
      <button id="calculate"      class="btn btn-primary">Calculate</button>
      <button id="complement-btn" class="btn btn-accent">Complement</button>
      <button id="random"         class="btn btn-secondary">Random</button>
      <button id="reset"          class="btn btn-secondary">Reset</button>
      <button id="undo" class="btn btn-secondary">Undo</button>
      <button id="redo" class="btn btn-secondary">Redo</button>
    </div>
  </div>

  <!-- TRANSFORMATIONS -->
  <div class="card">
    <h2>Transformations</h2>
    <div class="transformation-grid">

      <div class="transformation-item">
        <div class="transformation-header">
          <label for="Tn-output">Transposition (Tₙ)</label>
          <div class="selector-group">
            <label for="Tn-select">n =</label>
            <select id="Tn-select" class="Tn">
              <option value="0">0</option><option value="1">1</option><option value="2">2</option>
              <option value="3">3</option><option value="4">4</option><option value="5">5</option>
              <option value="6">6</option><option value="7">7</option><option value="8">8</option>
              <option value="9">9</option><option value="10">10</option><option value="11">11</option>
            </select>
          </div>
        </div>
        <textarea id="Tn-output" readonly></textarea>
      </div>

      <div class="transformation-item">
        <div class="transformation-header">
          <label for="TnI-output">Inversion (TₙI)</label>
          <div class="selector-group">
            <label for="TnI-select">n =</label>
            <select id="TnI-select" class="TnI">
              <option value="0">0</option><option value="1">1</option><option value="2">2</option>
              <option value="3">3</option><option value="4">4</option><option value="5">5</option>
              <option value="6">6</option><option value="7">7</option><option value="8">8</option>
              <option value="9">9</option><option value="10">10</option><option value="11">11</option>
            </select>
          </div>
        </div>
        <textarea id="TnI-output" readonly></textarea>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="card">
    <div class="footer-buttons">
      <button id="settings" class="btn btn-secondary">⚙ Settings</button>
      <button id="help"     class="btn btn-secondary">? Help</button>
    </div>
  </div>

</div>
</body>
</html>
