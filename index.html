<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Pitch Class Set Calculator</title>

        <link rel="stylesheet" href="style.css">
        <script src="index.js" defer></script>
    </head>

    <body>
        <h1>Pitch Class Set Calculator</h1>
        <hr>

        <div class="outputs">
            <div class="outputs-column">
                <label for="normal-order">Normal Order:</label>
                <label for="prime-form">Prime Form:</label>
                <label for="ic-vector">IC Vector:</label>
                <label for="complement">Complement:</label>
                <label for="forte-number">Forte Number:</label>
                <label for="z-mate">Z Mate:</label>
            </div>
            <div class="outputs-column">
                <input type="text" id="normal-order" readonly>
                <input type="text" id="prime-form" readonly>
                <input type="text" id="ic-vector" readonly>
                <input type="text" id="complement" readonly>
                <input type="text" id="forte-number" readonly>
                <input type="text" id="z-mate" readonly>
            </div>
        </div>
        <hr>

        <div class="pc-inputs">
            <div class="pc-inputs-row">
                <input type="checkbox" class="pc" id="1">
                <label for="1" class="pc-btn" data-note="C#/Db" data-number="1"></label>

                <input type="checkbox" class="pc" id="3">
                <label for="3" class="pc-btn" data-note="D#/Eb" data-number="3"></label>

                <label id="piano-space" class="pc-btn"></label>

                <input type="checkbox" class="pc" id="6">
                <label for="6" class="pc-btn" data-note="F#/Gb" data-number="6"></label>

                <input type="checkbox" class="pc" id="8">
                <label for="8" class="pc-btn" data-note="G#/Ab" data-number="8"></label>

                <input type="checkbox" class="pc" id="10">
                <label for="10" class="pc-btn" data-note="A#/Bb" data-number="10"></label>
            </div>
            <div class="pc-inputs-row">
                <input type="checkbox" class="pc" id="0">
                <label for="0" class="pc-btn" data-note="C" data-number="0"></label>

                <input type="checkbox" class="pc" id="2">
                <label for="2" class="pc-btn" data-note="D" data-number="2"></label>

                <input type="checkbox" class="pc" id="4">
                <label for="4" class="pc-btn" data-note="E" data-number="4"></label>

                <input type="checkbox" class="pc" id="5">
                <label for="5" class="pc-btn" data-note="F" data-number="5"></label>

                <input type="checkbox" class="pc" id="7">
                <label for="7" class="pc-btn" data-note="G" data-number="7"></label>

                <input type="checkbox" class="pc" id="9">
                <label for="9" class="pc-btn" data-note="A" data-number="9"></label>

                <input type="checkbox" class="pc" id="11">
                <label for="11" class="pc-btn" data-note="B" data-number="11"></label>
            </div>
        </div>
        
        <label for="output">Unmodified Set:</label>
        <input type="text" id="output" readonly>
        <button id="reset" onclick="reset()">Reset</button>
        <button id="complement-btn" onclick="switchToComplement()">Complement</button>
        <button id="random" onclick="generateRandom()">Random</button>
        <hr>

        <label for="Tn-select">Tₙ:</label>
        <select id="Tn-select" class="Tn">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
        </select>
        <input type="text" id="Tn-output" readonly>

        <label for="TnI-select">TₙI:</label>
        <select id="TnI-select" class="TnI">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
        </select>
        <input type="text" id="TnI-output" readonly>
        <hr>

        <button id="calculate" onclick="calculate()">Calculate</button> <!-- TODO: remove this button -->
        <button id="settings" onclick="location.href='settings.html'">Settings</button>
        <button id="help" onclick="window.open('help.html', 'helpWindow', 'width=600, height=500, resizable=yes, scrollbars=yes')">Help</button>
    </body>
</html>
