<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pitch Class Set Calculator</title>

        <link rel="stylesheet" href="style.css">
        <!-- <script src="index.js" defer></script> -->
        <script type="module" src="./modules/onStart.js" defer></script>
        <script type="module" src="./modules/index.js" defer></script>
        <script type="module" src="./modules/loadSettings.js" defer></script>
    </head>

    <body>
        <h1>Pitch Class Set Calculator</h1>
        <hr>

        <div class="outputs">
            <div class="outputs-column">
                <label for="normal-order">Normal Order:</label>
                <label for="prime-form">Prime Form:</label>
                <label for="ic-vector">IC Vector:</label>
                <label for="complement">Complement (Unordered):</label>
                <label for="forte-number">Forte Number:</label>
                <label for="z-mate">Z Mate:</label>
                <label for="known">Recognized Set:</label>
            </div>
            <div class="outputs-column">
                <input type="text" id="normal-order" readonly>
                <input type="text" id="prime-form" readonly>
                <input type="text" id="ic-vector" readonly>
                <input type="text" id="complement" readonly>
                <input type="text" id="forte-number" readonly>
                <input type="text" id="z-mate" readonly>
                <input type="text" id="known" readonly>
            </div>
        </div>
        <hr>

        <div class="pc-inputs">
            <div class="pc-inputs-row">
                <input type="checkbox" id="1" class="pc">
                <label for="1" class="pc-btn" pc-note="C#/Db" pc-number="1"></label>

                <input type="checkbox" id="3" class="pc">
                <label for="3" class="pc-btn" pc-note="D#/Eb" pc-number="3"></label>

                <label id="space" class="pc-btn"></label>

                <input type="checkbox" id="6" class="pc">
                <label for="6" class="pc-btn" pc-note="F#/Gb" pc-number="6"></label>

                <input type="checkbox" id="8" class="pc">
                <label for="8" class="pc-btn" pc-note="G#/Ab" pc-number="8"></label>

                <input type="checkbox" id="10" class="pc">
                <label for="10" class="pc-btn" pc-note="A#/Bb" pc-number="10"></label>
            </div>
            <div class="pc-inputs-row">
                <input type="checkbox" id="0" class="pc">
                <label for="0" class="pc-btn" pc-note="C" pc-number="0"></label>

                <input type="checkbox" id="2" class="pc">
                <label for="2" class="pc-btn" pc-note="D" pc-number="2"></label>

                <input type="checkbox" id="4" class="pc">
                <label for="4" class="pc-btn" pc-note="E" pc-number="4"></label>

                <input type="checkbox" id="5" class="pc">
                <label for="5" class="pc-btn" pc-note="F" pc-number="5"></label>

                <input type="checkbox" id="7" class="pc">
                <label for="7" class="pc-btn" pc-note="G" pc-number="7"></label>

                <input type="checkbox" id="9" class="pc">
                <label for="9" class="pc-btn" pc-note="A" pc-number="9"></label>

                <input type="checkbox" id="11" class="pc">
                <label for="11" class="pc-btn" pc-note="B" pc-number="11"></label>
            </div>
        </div>

        <label for="input">Input A Set:</label>
        <input type="text" id="input">
        <label for="output">Unordered Set:</label>
        <input type="text" id="output" readonly>
        <!-- <textarea id="output" readonly></textarea> -->
        <div class="button-container">
            <button id="calculate" onclick="calculate()">Calculate</button>
            <button id="reset" onclick="onReset()">Reset</button>
            <button id="complement-btn" onclick="switchToComplement()">Complement</button>
            <button id="random" onclick="generateRandom()">Random</button>
            <button class="undo" onclick="undo()">Undo</button>
            <button class="redo" onclick="redo()">Redo</button>
        </div>
        <hr>

        <label for="Tn-output">Transposition (Tₙ):</label>
        <div class="bottom-row">
            <label for="Tn-select">n =</label>
            <select id="Tn-select" class="Tn">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
            </select>
        </div>
        <textarea id="Tn-output" readonly></textarea>

        <label for="TnI-output">Inversion (TₙI):</label>
        <div class="bottom-row">
            <label for="TnI-select">n =</label>
            <select id="TnI-select" class="TnI">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
            </select>
        </div>
        <textarea id="TnI-output" readonly></textarea>
        <hr>

        <div class="button-container2">
            <button id="settings" onclick="location.href='./settings/settings.html'">Settings</button>
            <button id="help" onclick="window.open('help.html', 'helpWindow', 'width=600, height=500, resizable=yes, scrollbars=yes')">Help</button>
            <button id="exit" onclick="window.close()">Exit</button>
<!--            <button id="exit" onclick="location.href='../index.html'">Exit</button>-->
        </div>
    </body>
</html>
