<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Settings</title>

        <link rel="stylesheet" href="settings.css">
        <script src="settings.js" defer></script>
    </head>

    <body>
        <h1>Settings</h1>
        <div class="card">
            <h3>General</h3>
            <div class="settings-row">
                <label class="text">Notes or letters:</label>
                <input type="checkbox" id="notes-number" class="toggle">
                <label for="notes-number"></label>
            </div>

            <div class="settings-row">
                <label class="text">10/11 or T/E:</label>
                <input type="checkbox" id="ten-eleven" class="toggle">
                <label for="ten-eleven"></label>
            </div>

            <div class="settings-row">
                <label class="text">Type of packing:</label>
                <input type="checkbox" id="forte-rahn" class="toggle">
                <label for="forte-rahn"></label>
            </div>

            <div class="settings-row">
                <label class="text">Manual input on?</label>
                <input type="checkbox" id="manual-input" class="toggle">
                <label for="manual-input"></label>
            </div>
        </div>

        <div class="card">
            <h3>Transformations</h3>
            <div class="settings-row">
                <label class="text">Show multiple?</label>
                <input type="checkbox" id="show-multiple" class="toggle">
                <label for="show-multiple"></label>
            </div>

            <div class="settings-row">
                <label class="text">Show Unique Inversions?</label>
                <input type="checkbox" id="show-unique" class="toggle">
                <label for="show-unique"></label>
            </div>
        </div>

        <button id="back" class="btn" onclick="location.href='../index.html'">Back</button>
    </body>
</html>
